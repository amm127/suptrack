<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SupTrack — Sign In</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/fraunces@5/index.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dm-serif-display/index.css">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background-color: #EEF2F0;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(30,100,100,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 90%, rgba(196,160,64,0.06) 0%, transparent 55%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
    font-family: Georgia, serif;
  }

  .sparkle-field {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .sp {
    position: absolute;
    color: #1E4040;
    opacity: 0.12;
    animation: twinkle 4s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.08; transform: scale(1); }
    50%       { opacity: 0.22; transform: scale(1.2); }
  }

  /* Logo */
  .logo-wrap {
    text-align: center;
    margin-bottom: 44px;
    animation: fadeUp 0.8s ease both;
  }

  .logo-accents {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 2px;
  }

  .accent-star { color: #1E4040; font-size: 16px; opacity: 0.4; }

  .wordmark {
    font-family: 'Fraunces', 'DM Serif Display', Georgia, serif;
    font-size: 78px;
    font-weight: 700;
    color: #1E4040;
    letter-spacing: -2px;
    line-height: 1;
  }

  .tagline {
    font-family: Georgia, serif;
    font-size: 13px;
    font-style: italic;
    color: #608080;
    letter-spacing: 3.5px;
    margin-top: 14px;
  }

  /* Card */
  .card {
    background: #FAFDFB;
    border-radius: 24px;
    padding: 48px 44px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow:
      0 8px 48px rgba(30,64,64,0.10),
      0 2px 8px rgba(30,64,64,0.06);
    border: 1px solid #C8D8D4;
    animation: fadeUp 0.9s ease 0.1s both;
  }

  .card-heading {
    font-family: 'Fraunces', 'DM Serif Display', Georgia, serif;
    font-size: 30px;
    font-weight: 700;
    color: #102828;
    text-align: center;
    margin-bottom: 6px;
  }

  .card-sub {
    font-size: 14px;
    color: #608080;
    text-align: center;
    font-style: italic;
    margin-bottom: 32px;
    letter-spacing: 0.5px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 15px 18px;
    background: #E8F0EE;
    border: 1.5px solid #C0D0CC;
    border-radius: 12px;
    font-size: 15px;
    font-family: Georgia, serif;
    color: #102828;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input:focus {
    border-color: #1E4040;
    background: #EEF5F3;
  }

  input::placeholder { color: #88A8A4; }

  .btn-signin {
    width: 100%;
    padding: 17px;
    background: #1E4040;
    color: #C8E8E0;
    border: none;
    border-radius: 12px;
    font-family: 'Fraunces', 'DM Serif Display', Georgia, serif;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-signin:hover  { background: #102828; transform: translateY(-1px); }
  .btn-signin:active { transform: translateY(0); }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0;
    color: #C4A040;
    font-size: 11px;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #C8D8D4;
  }

  .signup-link {
    text-align: center;
    font-size: 13px;
    color: #608080;
  }

  .signup-link a {
    color: #1E4040;
    font-weight: 700;
    text-decoration: none;
    font-family: 'Fraunces', Georgia, serif;
  }

  .trust-line {
    text-align: center;
    font-size: 11px;
    color: #7A9898;
    letter-spacing: 2px;
    margin-top: 36px;
    animation: fadeUp 1s ease 0.2s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="sparkle-field">
  <span class="sp" style="top:8%;left:12%;font-size:14px;animation-delay:0s;">✦</span>
  <span class="sp" style="top:14%;right:16%;font-size:10px;animation-delay:1.2s;">✦</span>
  <span class="sp" style="top:73%;left:8%;font-size:10px;animation-delay:2s;">✦</span>
  <span class="sp" style="top:80%;right:12%;font-size:14px;animation-delay:0.6s;">✦</span>
  <span class="sp" style="top:42%;left:4%;font-size:8px;animation-delay:1.8s;">✦</span>
  <span class="sp" style="top:55%;right:5%;font-size:8px;animation-delay:0.4s;">✦</span>
</div>

<div class="logo-wrap">
  <div class="logo-accents">
    <span class="accent-star">✦</span>
    <span class="wordmark">SupTrack</span>
    <span class="accent-star" style="font-size:10px;">✦</span>
  </div>
  <div class="tagline">Supervision, simplified.</div>
</div>

<div class="card">
  <div class="card-heading">Welcome back</div>
  <div class="card-sub">Sign in to your account</div>

  <div class="field-group">
    <input type="email" placeholder="Email address">
    <input type="password" placeholder="Password">
  </div>

  <button class="btn-signin">Sign In</button>

  <div class="divider">✦</div>

  <div class="signup-link">
    Don't have an account? <a href="#">Sign Up</a>
  </div>
</div>

<div class="trust-line">© 2026 SUPTRACK · CLINICAL SUPERVISION PLATFORM</div>

</body>
</html>
