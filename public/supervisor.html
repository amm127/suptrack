<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Supervisor Profile — SupTrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #F5FAF9; color: #1B2D4F; min-height: 100vh; }
  .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #5A7B6E; font-size: 16px; }
  .not-found { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 40px; }
  .not-found h1 { font-size: 24px; margin-bottom: 8px; }
  .not-found p { color: #5A7B6E; font-size: 14px; margin-bottom: 24px; }
  .not-found a { background: linear-gradient(135deg, #1B2D4F, #3A9E9E); color: #fff; padding: 12px 28px; border-radius: 10px; text-decoration: none; font-weight: 600; }
  .profile-page { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
  .header { display: flex; align-items: flex-start; gap: 20px; margin-bottom: 32px; }
  .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #3A9E9E, #5AB88A); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 28px; font-weight: 600; flex-shrink: 0; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .name { font-size: 26px; font-weight: 600; margin-bottom: 4px; }
  .credential { color: #5A7B6E; font-size: 14px; }
  .tagline { color: #4A6A5A; font-size: 14px; margin-top: 6px; font-style: italic; }
  .section { background: #FFFFFF; border: 1px solid #D4E4E0; border-radius: 14px; padding: 22px 24px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .section-label { font-size: 11px; color: #5A7B6E; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  .bio { font-size: 14px; line-height: 1.8; color: #1B2D4F; }
  .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .badge { padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .badge-green { background: #E8F5EE; color: #2E7A4E; }
  .badge-teal { background: #E8F5F2; color: #1B5E5E; }
  .badge-muted { background: #EFF6F4; color: #5A7B6E; }
  .specialty { background: #E8F5F2; color: #1B5E5E; border: 1px solid #A8D8D0; border-radius: 20px; padding: 4px 14px; font-size: 12px; display: inline-block; margin: 3px 4px 3px 0; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .info-card { background: #EFF6F4; border-radius: 10px; padding: 12px 14px; }
  .info-label { font-size: 10px; color: #5A7B6E; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .info-value { font-size: 14px; color: #1B2D4F; }
  .connect-btn { width: 100%; background: linear-gradient(135deg, #1B2D4F, #2A5A6A, #3A9E9E); color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px; font-family: inherit; }
  .connect-btn:hover { opacity: 0.9; }
  .logo-bar { text-align: center; padding: 24px 0 0; }
  .logo-bar img { width: 120px; }
  .footer { text-align: center; padding: 32px 0; font-size: 12px; color: rgba(27,45,79,0.3); }
  @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr 1fr; } .header { flex-direction: column; align-items: center; text-align: center; } }
</style>
</head>
<body>
<div class="logo-bar"><a href="/"><img src="/logo.png" alt="SupTrack"/></a></div>
<div id="app"><div class="loading">Loading profile...</div></div>
<div class="footer">&copy; 2026 SupTrack</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
  'https://mkjreqkrjhnjsbtchjhy.supabase.co',
  'sb_publishable_5FsDbxIWWF235kR0zBCC3g_1pniQXJq'
);

const app = document.getElementById('app');

// Get slug from URL: /supervisor/alyson-mullen or /supervisor.html?slug=alyson-mullen
const path = window.location.pathname;
const pathMatch = path.match(/\/supervisor\/([^/?]+)/);
const slug = pathMatch ? pathMatch[1] : new URLSearchParams(window.location.search).get('slug');

if (!slug) {
  app.innerHTML = `<div class="not-found"><h1>Supervisor not found</h1><p>No supervisor profile specified.</p><a href="/">Go to SupTrack</a></div>`;
} else {
  // Load all supervisors with profiles, find the one matching this slug
  const { data } = await supabase
    .from('supervisors')
    .select('user_id, name, email, phone, credential, photo, profile_data')
    .not('profile_data', 'is', null);

  const match = (data || []).find(s => {
    const pd = s.profile_data || {};
    const n = pd.name || s.name || '';
    const nameSlug = n.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
    return nameSlug === slug;
  });

  if (!match) {
    app.innerHTML = `<div class="not-found"><h1>Profile not found</h1><p>We couldn't find a supervisor with that name.</p><a href="/">Go to SupTrack</a></div>`;
  } else {
    const pd = match.profile_data || {};
    const name = pd.name || match.name || 'Supervisor';
    const initials = name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const photoHtml = match.photo
      ? `<img src="${match.photo}" alt="${name}"/>`
      : initials;

    const specialtiesHtml = (pd.specialties || []).map(s => `<span class="specialty">${s}</span>`).join('');

    const infoCards = [
      pd.yearsExperience && ['Experience', `${pd.yearsExperience} years`],
      pd.licenseState && ['State', pd.licenseState],
      pd.licenseNumber && ['License #', pd.licenseNumber],
      pd.feeIndividual > 0 && ['Individual fee', `$${pd.feeIndividual}/${pd.feeIndividualUnit === 'session' ? 'session' : 'mo'}`],
      pd.feeGroup > 0 && ['Group fee', `$${pd.feeGroup}/session`],
      (pd.languages || []).length > 0 && ['Languages', pd.languages.join(', ')],
    ].filter(Boolean).map(([l, v]) => `<div class="info-card"><div class="info-label">${l}</div><div class="info-value">${v}</div></div>`).join('');

    const badges = [
      pd.accepting !== false && '<span class="badge badge-green">Accepting new supervisees</span>',
      pd.acceptingStudents && '<span class="badge badge-teal">Practicum students</span>',
      pd.telehealth && '<span class="badge badge-muted">Telehealth</span>',
      pd.inPerson && '<span class="badge badge-muted">In-person</span>',
    ].filter(Boolean).join('');

    document.title = `${name} — SupTrack`;

    app.innerHTML = `
      <div class="profile-page">
        <div class="header">
          <div class="avatar">${photoHtml}</div>
          <div>
            <div class="name">${name}</div>
            <div class="credential">${pd.credential || match.credential || ''}${pd.licenseState ? ' · ' + pd.licenseState : ''}</div>
            ${pd.tagline ? `<div class="tagline">${pd.tagline}</div>` : ''}
          </div>
        </div>

        ${badges ? `<div class="badges">${badges}</div>` : ''}

        ${pd.bio ? `<div class="section"><div class="section-label">About</div><div class="bio">${pd.bio}</div></div>` : ''}

        ${pd.supervisionStyle ? `<div class="section"><div class="section-label">Supervision style</div><div class="bio">${pd.supervisionStyle}</div></div>` : ''}

        ${specialtiesHtml ? `<div class="section"><div class="section-label">Specialties</div><div>${specialtiesHtml}</div></div>` : ''}

        ${infoCards ? `<div class="info-grid">${infoCards}</div>` : ''}

        <button class="connect-btn" onclick="window.location.href='/'">Sign in to connect</button>
      </div>
    `;
  }
}
</script>
</body>
</html>
